---
observium::required_packages:
  - 'wget'
  - 'libapache2-mod-php8.3'
  - 'php8.3-cli'
  - 'php8.3-ldap'
  - 'php8.3-mysql'
  - 'php8.3-gd'
  - 'php-pear'
  - 'fping'
  - 'python3-mysqldb'
  - 'whois'
  - 'rrdtool'
  - 'subversion'
  - 'mtr-tiny'
  - 'ipmitool'
  - 'graphviz'
  - 'imagemagick'
  - 'libvirt-clients'
  - 'snmp'
  - 'python-is-python3'
  - 'python3-pymysql'
observium::fping_location: "/usr/bin/fping"
observium::apache_user: "www-data"
observium::apache_service: "apache2"
observium::openssl_location: "/usr/bin/openssl"
observium::mysql_location: "/usr/bin/mysql"
observium::manage_selinux: false
observium::debiansnmp_user: "Debian-snmp"
observium::manage_fw: false
observium::db_charset: "utf8mb3"
observium::db_collate: "utf8mb3_general_ci"
